<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonky UFO</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      canvas { display: block; }
      #mute-btn {
        position: fixed;
        top: 10px;
        left: 10px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        opacity: 0.6;
        line-height: 1;
        padding: 4px;
      }
      #mute-btn:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <button id="mute-btn">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
